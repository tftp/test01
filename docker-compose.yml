version: "3"

services:
  nginx:
    image: nginx:latest
    container_name: nginx_proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks:
      - test_network

  backend:
    container_name: http_server
    build:  ./backend
    expose:
      - "8080"
    networks:
      - test_network

networks:
  test_network:
    driver: bridge
